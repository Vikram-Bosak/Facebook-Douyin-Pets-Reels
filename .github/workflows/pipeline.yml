name: Douyin Pets Reels Pipeline

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if limits reached'
        required: false
        default: 'false'

env:
  MAX_DOWNLOADS: "10"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: python main_agent.py

      - name: Upload downloaded videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pet-videos-${{ github.run_number }}
          path: workspace/videos/
          retention-days: 7
          if-no-files-found: ignore
